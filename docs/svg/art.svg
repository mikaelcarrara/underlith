<svg xmlns="http://www.w3.org/2000/svg" viewBox="55 45 450 415" width="450" height="415">
  <defs>
    <style>
      @keyframes drop {
        0%   { opacity:0; transform:translateY(-80px); }
        60%  { opacity:1; transform:translateY(6px); }
        80%  { transform:translateY(-3px); }
        100% { opacity:1; transform:translateY(0); }
      }
      .layer-lime { animation: drop 1.0s cubic-bezier(0.34,1.2,0.64,1) 0.1s both; }
      .layer-pink { animation: drop 1.0s cubic-bezier(0.34,1.2,0.64,1) 0.9s both; }
      .layer-cyan { animation: drop 1.0s cubic-bezier(0.34,1.2,0.64,1) 1.7s both; }

      @keyframes fadeIn { from{opacity:0} to{opacity:1} }

      @keyframes pulse  {
        0%   { opacity:0.3; }
        50%  { opacity:0.9; }
        100% { opacity:0.3; }
      }

      .tk1 { opacity:0; animation: fadeIn 0.6s ease 0.8s  forwards, pulse 3.5s ease-in-out 1.8s infinite; }
      .tk2 { opacity:0; animation: fadeIn 0.6s ease 1.0s  forwards, pulse 3.5s ease-in-out 2.2s infinite; }
      .tk3 { opacity:0; animation: fadeIn 0.6s ease 1.2s  forwards, pulse 3.5s ease-in-out 2.6s infinite; }
      .tk4 { opacity:0; animation: fadeIn 0.6s ease 1.4s  forwards, pulse 3.5s ease-in-out 3.0s infinite; }

      .mk1 { opacity:0; animation: fadeIn 0.6s ease 1.6s  forwards, pulse 3.5s ease-in-out 2.4s infinite; }
      .mk2 { opacity:0; animation: fadeIn 0.6s ease 1.8s  forwards, pulse 3.5s ease-in-out 2.8s infinite; }
      .mk3 { opacity:0; animation: fadeIn 0.6s ease 2.0s  forwards, pulse 3.5s ease-in-out 3.2s infinite; }

      .ck1 { opacity:0; animation: fadeIn 0.6s ease 2.4s  forwards, pulse 3.5s ease-in-out 3.0s infinite; }
      .ck2 { opacity:0; animation: fadeIn 0.6s ease 2.6s  forwards, pulse 3.5s ease-in-out 3.4s infinite; }
      .ck3 { opacity:0; animation: fadeIn 0.6s ease 2.8s  forwards, pulse 3.5s ease-in-out 3.8s infinite; }

      @keyframes beamRise {
        0%   { opacity:0;    transform:translateY(0) scaleX(1); }
        8%   { opacity:0.0; }
        20%  { opacity:0.22; transform:translateY(-40px) scaleX(0.85); }
        65%  { opacity:0.06; transform:translateY(-170px) scaleX(0.4); }
        100% { opacity:0;    transform:translateY(-240px) scaleX(0.1); }
      }
      .glow-beam {
        opacity:0;
        transform-origin: 280px 365px;
        animation: beamRise 4s cubic-bezier(0.4,0,0.2,1) 3.0s infinite;
      }

      @keyframes pUp {
        0%   { opacity:0;   transform:translateY(0)      scale(0.8); }
        12%  { opacity:0.9; transform:translateY(-18px)  scale(1.1); }
        88%  { opacity:0.2; transform:translateY(-270px) scale(0.9); }
        100% { opacity:0;   transform:translateY(-295px) scale(0.7); }
      }

      .p { opacity:0; animation: pUp cubic-bezier(0.4,0,0.6,1) infinite; }
      .p1  { animation-duration:3.2s; animation-delay:3.1s; }
      .p2  { animation-duration:3.8s; animation-delay:3.5s; }
      .p3  { animation-duration:2.9s; animation-delay:3.9s; }
      .p4  { animation-duration:3.5s; animation-delay:3.3s; }
      .p5  { animation-duration:3.1s; animation-delay:3.7s; }
      .p6  { animation-duration:2.8s; animation-delay:4.2s; }
      .p7  { animation-duration:4.0s; animation-delay:3.2s; }
      .p8  { animation-duration:3.0s; animation-delay:4.5s; }
      .p9  { animation-duration:3.6s; animation-delay:4.8s; }
      .p10 { animation-duration:3.3s; animation-delay:4.0s; }
      .p11 { animation-duration:2.7s; animation-delay:5.1s; }
      .p12 { animation-duration:3.9s; animation-delay:3.6s; }
    </style>

    <clipPath id="clip-lime">
      <path fill-rule="evenodd" d="M0,0 H560 V520 H0 Z M280,165 L500,255 L280,345 L60,255 Z"/>
    </clipPath>
    <clipPath id="clip-pink">
      <path fill-rule="evenodd" d="M0,0 H560 V520 H0 Z M280,55 L500,145 L280,235 L60,145 Z"/>
    </clipPath>
    <clipPath id="clip-tower">
      <rect x="60" y="55" width="440" height="420"/>
    </clipPath>
    <clipPath id="clip-lime-inside">
      <polygon points="280,275 500,365 280,455 60,365"/>
    </clipPath>
    <clipPath id="clip-pink-inside">
      <polygon points="280,165 500,255 280,345 60,255"/>
    </clipPath>
    <clipPath id="clip-cyan-inside">
      <polygon points="280,55 500,145 280,235 60,145"/>
    </clipPath>

    <radialGradient id="glow-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#c8f030" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#c8f030" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8f030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- LIME -->
  <polygon class="layer-lime"
    clip-path="url(#clip-lime)"
    points="280,275 500,365 280,455 60,365"
    fill="none" stroke="#c8f030" stroke-width="5" stroke-linejoin="miter"/>

  <g class="tk1" clip-path="url(#clip-lime-inside)">
    <line x1="60"  y1="365" x2="500" y2="365" stroke="#c8f030" stroke-width="1" opacity="0.25"/>
    <line x1="280" y1="275" x2="280" y2="455" stroke="#c8f030" stroke-width="1" opacity="0.25"/>
  </g>

  <text class="tk1" clip-path="url(#clip-lime-inside)"
    x="280" y="316" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#c8f030" text-anchor="middle">color</text>
  <text class="tk2" clip-path="url(#clip-lime-inside)"
    x="390" y="369" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#c8f030" text-anchor="middle">spacing</text>
  <text class="tk3" clip-path="url(#clip-lime-inside)"
    x="280" y="422" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#c8f030" text-anchor="middle">radius</text>
  <text class="tk4" clip-path="url(#clip-lime-inside)"
    x="170" y="369" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#c8f030" text-anchor="middle">typo</text>

  <!-- PINK -->
  <polygon class="layer-pink"
    clip-path="url(#clip-pink)"
    points="280,165 500,255 280,345 60,255"
    fill="none" stroke="#e87dd0" stroke-width="5" stroke-linejoin="miter"/>

  <g class="mk1" clip-path="url(#clip-pink-inside)">
    <line x1="60"  y1="255" x2="500" y2="255" stroke="#e87dd0" stroke-width="1" opacity="0.25"/>
    <line x1="280" y1="165" x2="280" y2="345" stroke="#e87dd0" stroke-width="1" opacity="0.25"/>
  </g>

  <text class="mk1" clip-path="url(#clip-pink-inside)"
    x="280" y="206" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#e87dd0" text-anchor="middle">h1</text>
  <text class="mk2" clip-path="url(#clip-pink-inside)"
    x="170" y="259" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#e87dd0" text-anchor="middle">p</text>
  <text class="mk3" clip-path="url(#clip-pink-inside)"
    x="390" y="259" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#e87dd0" text-anchor="middle">li</text>

  <!-- CYAN -->
  <polygon class="layer-cyan"
    points="280,55 500,145 280,235 60,145"
    fill="none" stroke="#3ef5d0" stroke-width="5" stroke-linejoin="miter"/>

  <g class="ck1" clip-path="url(#clip-cyan-inside)">
    <line x1="60"  y1="145" x2="500" y2="145" stroke="#3ef5d0" stroke-width="1" opacity="0.25"/>
    <line x1="280" y1="55"  x2="280" y2="235" stroke="#3ef5d0" stroke-width="1" opacity="0.25"/>
  </g>

  <text class="ck1" clip-path="url(#clip-cyan-inside)"
    x="280" y="98" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#3ef5d0" text-anchor="middle">Button</text>
  <text class="ck2" clip-path="url(#clip-cyan-inside)"
    x="170" y="149" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#3ef5d0" text-anchor="middle">Input</text>
  <text class="ck3" clip-path="url(#clip-cyan-inside)"
    x="390" y="149" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700"
    fill="#3ef5d0" text-anchor="middle">Card</text>

  <!-- GLOW BEAM -->
  <ellipse class="glow-beam"
    cx="280" cy="375" rx="140" ry="65"
    fill="url(#glow-grad)"/>

  <!-- PARTICLES — spread slightly via cx offset -->
  <g clip-path="url(#clip-tower)">
    <circle class="p p1"  cx="248" cy="365" r="2"   fill="#c8f030"/>
    <circle class="p p2"  cx="262" cy="370" r="1.5" fill="#c8f030"/>
    <circle class="p p3"  cx="276" cy="362" r="2.5" fill="#c8f030"/>
    <circle class="p p4"  cx="290" cy="370" r="1.5" fill="#c8f030"/>
    <circle class="p p5"  cx="308" cy="364" r="2"   fill="#c8f030"/>
    <circle class="p p6"  cx="268" cy="374" r="1.5" fill="#c8f030"/>
    <circle class="p p7"  cx="284" cy="374" r="1.8" fill="#c8f030"/>
    <circle class="p p8"  cx="255" cy="367" r="1.2" fill="#c8f030"/>
    <circle class="p p9"  cx="298" cy="360" r="1.5" fill="#c8f030"/>
    <circle class="p p10" cx="278" cy="378" r="2"   fill="#c8f030"/>
    <circle class="p p11" cx="240" cy="368" r="1.2" fill="#c8f030"/>
    <circle class="p p12" cx="316" cy="366" r="1.5" fill="#c8f030"/>
  </g>
</svg>
