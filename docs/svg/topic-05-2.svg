<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"><defs><style>
@keyframes pulse{0%,100%{opacity:.03}50%{opacity:.12}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes fade-cycle{0%{opacity:0}20%{opacity:.65}60%{opacity:.55}100%{opacity:0}}
.pulse{animation:pulse 3s ease-in-out infinite}
.blink{animation:blink 2.4s ease-in-out infinite}
.fw1{animation:fade-cycle 5s ease-in-out infinite 0s}
.fw2{animation:fade-cycle 5s ease-in-out infinite 1.25s}
.fw3{animation:fade-cycle 5s ease-in-out infinite 2.5s}
.fw4{animation:fade-cycle 5s ease-in-out infinite 3.75s}
</style></defs>

<!-- Core — always on -->
<circle cx="200" cy="200" r="34" fill="none" stroke="#C8F542" stroke-width="18" class="pulse"/>
<circle cx="200" cy="200" r="28" fill="none" stroke="#C8F542" stroke-width="0.9" opacity="0.85"/>
<circle cx="200" cy="200" r="3" fill="#C8F542" class="blink"/>

<!-- Faint lines to corners -->
<line x1="172" y1="172" x2="100" y2="100" stroke="#C8F542" stroke-width="0.4" stroke-dasharray="2 5" opacity="0.18"/>
<line x1="228" y1="172" x2="300" y2="100" stroke="#C8F542" stroke-width="0.4" stroke-dasharray="2 5" opacity="0.18"/>
<line x1="172" y1="228" x2="100" y2="300" stroke="#C8F542" stroke-width="0.4" stroke-dasharray="2 5" opacity="0.18"/>
<line x1="228" y1="228" x2="300" y2="300" stroke="#C8F542" stroke-width="0.4" stroke-dasharray="2 5" opacity="0.18"/>

<!-- Framework nodes: appear and disappear, staggered -->
<!-- top-left: React -->
<g class="fw1" style="transform-origin:88px 88px">
  <rect x="52" y="52" width="72" height="72" rx="4" fill="none" stroke="white" stroke-width="0.8"/>
  <text x="88" y="84" text-anchor="middle" font-family="monospace" font-size="12" fill="white">React</text>
  <line x1="64" y1="96" x2="112" y2="96" stroke="#00e5cc" stroke-width="2" opacity="0.5"/>
  <line x1="64" y1="106" x2="104" y2="106" stroke="#00e5cc" stroke-width="2" opacity="0.3"/>
</g>

<!-- top-right: Vue -->
<g class="fw2" style="transform-origin:312px 88px">
  <rect x="276" y="52" width="72" height="72" rx="4" fill="none" stroke="white" stroke-width="0.8"/>
  <text x="312" y="84" text-anchor="middle" font-family="monospace" font-size="12" fill="white">Vue</text>
  <line x1="288" y1="96" x2="336" y2="96" stroke="#00e5cc" stroke-width="2" opacity="0.5"/>
  <line x1="288" y1="106" x2="328" y2="106" stroke="#00e5cc" stroke-width="2" opacity="0.3"/>
</g>

<!-- bottom-left: Svelte -->
<g class="fw3" style="transform-origin:88px 312px">
  <rect x="52" y="276" width="72" height="72" rx="4" fill="none" stroke="white" stroke-width="0.8"/>
  <text x="88" y="308" text-anchor="middle" font-family="monospace" font-size="12" fill="white">Svelte</text>
  <line x1="64" y1="320" x2="112" y2="320" stroke="#00e5cc" stroke-width="2" opacity="0.5"/>
  <line x1="64" y1="330" x2="104" y2="330" stroke="#00e5cc" stroke-width="2" opacity="0.3"/>
</g>

<!-- bottom-right: Angular -->
<g class="fw4" style="transform-origin:312px 312px">
  <rect x="276" y="276" width="72" height="72" rx="4" fill="none" stroke="white" stroke-width="0.8"/>
  <text x="312" y="308" text-anchor="middle" font-family="monospace" font-size="12" fill="white">Angular</text>
  <line x1="288" y1="320" x2="336" y2="320" stroke="#00e5cc" stroke-width="2" opacity="0.5"/>
  <line x1="288" y1="330" x2="328" y2="330" stroke="#00e5cc" stroke-width="2" opacity="0.3"/>
</g>

</svg>
