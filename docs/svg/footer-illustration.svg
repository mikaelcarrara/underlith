<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 400" width="1440" height="400" style="display:block">
<defs>
  <filter id="xsoft" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
  <linearGradient id="top-mask" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#111111" stop-opacity="1"/>
    <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
  </linearGradient>
</defs>
<style>
  .mono { font-family: 'Courier New', monospace; }

  .fly { animation: fly-up linear infinite; will-change:transform,opacity; }
  @keyframes fly-up {
    0%  { transform:translateY(0);      opacity:0; }
    8%  { opacity:.45; }
    80% { opacity:.3; }
    100%{ transform:translateY(-420px); opacity:0; }
  }

  .rise { animation: t-rise linear infinite; will-change:transform,opacity; }
  @keyframes t-rise {
    0%  { transform:translateY(0);      opacity:0; }
    10% { opacity:.4; }
    75% { opacity:.2; }
    100%{ transform:translateY(-420px); opacity:0; }
  }

  .thread { animation: thread-rise linear infinite; will-change:transform,opacity; }
  @keyframes thread-rise {
    0%  { transform:translateY(0);      opacity:0; }
    10% { opacity:.18; }
    90% { opacity:.06; }
    100%{ transform:translateY(-420px); opacity:0; }
  }

  .sp { animation: sp-f ease-in-out infinite; }
  @keyframes sp-f {
    0%,100%{ opacity:0; r:1; }
    50%    { opacity:.3; r:2; }
  }
</style>

<rect width="1440" height="400" fill="#111111"/>
<line class="thread" x1="120"  y1="400" x2="115"  y2="200" stroke="#C8F542" stroke-width="0.4" style="animation-duration:8.0s;animation-delay:0s"/>
<line class="thread" x1="320"  y1="400" x2="328"  y2="200" stroke="#C8F542" stroke-width="0.3" style="animation-duration:10.2s;animation-delay:.7s"/>
<line class="thread" x1="510"  y1="400" x2="502"  y2="200" stroke="#C8F542" stroke-width="0.5" style="animation-duration:7.2s;animation-delay:1.3s"/>
<line class="thread" x1="700"  y1="400" x2="712"  y2="200" stroke="#C8F542" stroke-width="0.4" style="animation-duration:9.2s;animation-delay:.5s"/>
<line class="thread" x1="890"  y1="400" x2="878"  y2="200" stroke="#C8F542" stroke-width="0.3" style="animation-duration:7.8s;animation-delay:1.9s"/>
<line class="thread" x1="1080" y1="400" x2="1092" y2="200" stroke="#C8F542" stroke-width="0.5" style="animation-duration:10.8s;animation-delay:.9s"/>
<line class="thread" x1="1260" y1="400" x2="1248" y2="200" stroke="#C8F542" stroke-width="0.4" style="animation-duration:8.8s;animation-delay:2.3s"/>
<line class="thread" x1="1410" y1="400" x2="1418" y2="200" stroke="#C8F542" stroke-width="0.3" style="animation-duration:6.8s;animation-delay:.3s"/>
<rect class="fly" x="0" y="232" width="3" height="3" fill="#C8F542" style="animation-duration:15.0s;  animation-delay:0s"/>
<rect class="fly" x="0" y="258" width="2" height="2" fill="#C8F542" style="animation-duration:21.2s;animation-delay:1.1s"/>
<rect class="fly" x="0" y="285" width="4" height="4" fill="#C8F542" style="animation-duration:13.8s;animation-delay:2.4s"/>
<rect class="fly" x="0" y="312" width="2" height="2" fill="#C8F542" style="animation-duration:18.8s;animation-delay:.8s"/>
<rect class="fly" x="0" y="338" width="3" height="3" fill="#C8F542" style="animation-duration:22.5s;  animation-delay:3.5s"/>
<rect class="fly" x="0" y="356" width="2" height="2" fill="#C8F542" style="animation-duration:16.2s;animation-delay:2s"/>
<rect class="fly" x="0" y="244" width="3" height="3" fill="#C8F542" style="animation-duration:17.5s;  animation-delay:4.3s"/>
<rect class="fly" x="0" y="322" width="2" height="2" fill="#C8F542" style="animation-duration:13.0s;animation-delay:.5s"/>
<rect class="fly" x="0" y="270" width="3" height="3" fill="#C8F542" style="animation-duration:20.0s;  animation-delay:5.2s"/>
<rect class="fly" x="0" y="298" width="2" height="2" fill="#C8F542" style="animation-duration:15.8s;animation-delay:2.8s"/>
<text class="mono rise" x="80"   y="365" font-size="9"   fill="#C8F542" style="animation-duration:17.5s;  animation-delay:0s">  --color-primary</text>
<text class="mono rise" x="255"  y="348" font-size="8"   fill="#C8F542" style="animation-duration:22.5s;  animation-delay:1.5s">--space-md</text>
<text class="mono rise" x="435"  y="366" font-size="9"   fill="#C8F542" style="animation-duration:15.2s;animation-delay:2.9s">--radius-sm</text>
<text class="mono rise" x="625"  y="355" font-size="8"   fill="#C8F542" style="animation-duration:20.5s;animation-delay:.8s"> --font-size-lg</text>
<text class="mono rise" x="810"  y="363" font-size="9"   fill="#C8F542" style="animation-duration:19.0s;animation-delay:3.3s">--color-surface</text>
<text class="mono rise" x="1000" y="350" font-size="8"   fill="#C8F542" style="animation-duration:16.5s;animation-delay:1.1s">--shadow-lg</text>
<text class="mono rise" x="1165" y="360" font-size="9"   fill="#C8F542" style="animation-duration:21.5s;animation-delay:4.1s">--border-width</text>
<text class="mono rise" x="1335" y="346" font-size="8"   fill="#C8F542" style="animation-duration:17.8s;animation-delay:2.1s">--color-accent</text>
<text class="mono rise" x="165"  y="358" font-size="7.5" fill="#C8F542" style="animation-duration:25.0s; animation-delay:5.1s">--opacity</text>
<text class="mono rise" x="550"  y="368" font-size="7.5" fill="#C8F542" style="animation-duration:24.0s;animation-delay:1.9s">--space-xs</text>
<text class="mono rise" x="930"  y="364" font-size="7.5" fill="#C8F542" style="animation-duration:20.2s;animation-delay:3.9s">--z-index</text>
<text class="mono rise" x="1250" y="352" font-size="7.5" fill="#C8F542" style="animation-duration:17.2s;animation-delay:.4s"> --easing</text>
<circle class="sp" cx="120"  cy="332" r="1" fill="#C8F542" style="animation-duration:7.0s;animation-delay:.3s"/>
<circle class="sp" cx="380"  cy="308" r="1" fill="#C8F542" style="animation-duration:8.8s;animation-delay:1.1s"/>
<circle class="sp" cx="660"  cy="325" r="1" fill="#C8F542" style="animation-duration:6.0s;animation-delay:2s"/>
<circle class="sp" cx="920"  cy="312" r="1" fill="#C8F542" style="animation-duration:8.0s;animation-delay:.7s"/>
<circle class="sp" cx="1185" cy="328" r="1" fill="#C8F542" style="animation-duration:7.2s;animation-delay:1.5s"/>
<circle class="sp" cx="1410" cy="315" r="1" fill="#C8F542" style="animation-duration:9.5s;animation-delay:3s"/>

<rect x="0" y="0" width="1440" height="120" fill="url(#top-mask)"/>
</svg>