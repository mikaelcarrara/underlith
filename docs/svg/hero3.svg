30%{opacity:.3;}
70%{opacity:.75;}
100%{transform:translateX(920px);opacity:0;}
}
@keyframes pulse-g{0%,100%{opacity:0.15;}50%{opacity:1.0;}}
.pg{animation:pulse-g 3.6s ease-in-out infinite;}
</style>
